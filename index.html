<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ramyasri Akula – Software Engineer Job Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0a0600;--surface:#1a0f05;--surface2:#241505;--border:#3a2010;--accent:#fb923c;--accent2:#ea580c;--warn:#f5c842;--danger:#ff6b72;--text:#e8e0ff;--muted:#7a5030;}
body{background:var(--bg);font-family:'Syne',sans-serif;color:var(--text);min-height:100vh;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;}
.jcard{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;cursor:pointer;transition:border-color .18s,transform .18s;margin-bottom:10px;}
.jcard:hover{border-color:var(--accent);transform:translateX(4px);}
.jcard.sel{border-color:var(--accent);background:var(--surface2);}
.jcard.glow{animation:newglow 5s ease forwards;}
@keyframes newglow{0%{border-color:#3b8aff;box-shadow:0 0 16px rgba(59,138,255,.4);}100%{border-color:var(--border);box-shadow:none;}}
.btn{padding:8px 18px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;transition:all .18s;}
.btn-g{background:var(--accent);color:#0a0600;}
.btn-g:hover{background:#e05c00;transform:translateY(-1px);}
.btn-o{background:transparent;border:1px solid var(--border);color:#cc9060;}
.btn-o:hover{border-color:var(--accent);color:var(--accent);}
.btn-b{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-b:hover{border-color:var(--warn);color:var(--warn);}
.tag{display:inline-block;padding:3px 9px;background:var(--surface2);border-radius:4px;font-size:11px;color:#cc9060;margin:2px;border:1px solid var(--border);font-family:'DM Mono',monospace;}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.pill-g{background:#0a2e1e;color:#00e8a2;border:1px solid #0e4028;}
.pill-b{background:#0a1a30;color:#3b8aff;border:1px solid #0e2245;}
.pill-y{background:#2a1e08;color:var(--warn);border:1px solid #3a2a08;}
.pill-r{background:#2a0e0e;color:var(--danger);border:1px solid #3a1010;}
.inp{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;}
.inp:focus{outline:none;border-color:var(--accent);}
.inp option{background:var(--surface);}
.tab-btn{background:none;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:10px 18px;transition:all .2s;border-bottom:2px solid transparent;color:var(--muted);}
.tab-btn.on{color:var(--accent);border-bottom-color:var(--accent);}
.tab-btn:hover:not(.on){color:#cc9060;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;}
.mbox{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:680px;max-height:88vh;display:flex;flex-direction:column;}
.mhead{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.mbody{padding:22px;overflow-y:auto;flex:1;}
.pre{white-space:pre-wrap;font-family:'DM Mono',monospace;font-size:12.5px;line-height:1.75;color:#cc9060;}
.hbar{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.hbar-bg{flex:1;height:6px;border-radius:3px;background:var(--border);}
.hbar-fill{height:6px;border-radius:3px;transition:width .5s ease;}
.pulse{animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.spin{animation:spin 1s linear infinite;display:inline-block;width:12px;height:12px;border:2px solid #0a0600;border-top-color:transparent;border-radius:50%;}
@keyframes spin{to{transform:rotate(360deg);}}
.fade{animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.fbtn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;transition:all .2s;}
.fbtn.awt{border-color:var(--accent);background:var(--surface2);color:var(--accent);}
.fbtn.avisa{border-color:var(--warn);background:var(--surface2);color:var(--warn);}
.toast{position:fixed;bottom:22px;right:22px;border-radius:8px;padding:11px 18px;font-size:13px;z-index:9999;animation:fadeUp .2s ease;}
</style>
</head>

const APP_ID="e019478c",APP_KEY="0df3470c95960c61e6b6924705e71785";
const BASE="https://api.adzuna.com/v1/api/jobs/us/search";
const PROFILE={
  name:"Ramyasri Akula",title:"Java Full Stack Developer | Spring Boot · React · Microservices · AWS",

  visa:"Verify Sponsorship per Role",
  coreSkills:["java","spring boot","spring cloud","microservices","react","angular","javascript","typescript","node.js","html5","css3","restful api","graphql","aws","azure","gcp","docker","kubernetes","eks","aks","lambda","ec2","s3","kafka","rabbitmq","jms","oauth","jwt","postgresql","mongodb","mysql","oracle","dynamodb","redis","hibernate","jpa","jenkins","github actions","ci/cd","terraform","elk stack","prometheus","grafana","junit","mockito","generative ai","llm","nlp","github copilot","fraud detection"],
  experience:[

let jobs=[],selected=null,tracker=[],tab="feed";

function score(j){
  const b=`${j.title} ${j.description||""} ${j.category?.label||""}`.toLowerCase();
  let h=0;PROFILE.coreSkills.forEach(s=>{if(b.includes(s))h++;});
  return Math.min(Math.round(50+(h/PROFILE.coreSkills.length)*50),99);
}
function mc(s){return s>=88?"#fb923c":s>=74?"#f5c842":"#ff6b72";}
function rt(d){
  if(!d)return"—";const h=Math.floor((Date.now()-new Date(d).getTime())/3600000);
  return h<1?"< 1h ago":h<24?`${h}h ago`:`${Math.floor(h/24)}d ago`;
}
function tags(j){
  const b=`${j.title} ${j.description||""}`.toLowerCase();
  return ["java","spring boot","react","angular","microservices","aws","azure","kubernetes","docker","kafka","graphql","typescript","node","postgresql","mongodb","jenkins","terraform","oauth","generative ai","llm","redis","elk"].filter(k=>b.includes(k)).slice(0,6);
}
function wtype(j){
  const b=`${j.title} ${j.description||""} ${j.location?.display_name||""}`.toLowerCase();
  if(b.includes("fully remote")||b.includes("100% remote")||b.includes("work from home"))return"remote";
  if(b.includes("remote")&&b.includes("hybrid"))return"hybrid";
  if(b.includes("remote"))return"remote";
  if(b.includes("hybrid"))return"hybrid";
  if(b.includes("on-site")||b.includes("onsite")||b.includes("in-office"))return"onsite";
  if(j.location?.display_name)return"onsite";
  return"unknown";
}
function wtb(t){
  const m={remote:{l:"🌐 Remote",bg:"#0a2e1e",c:"#00e8a2",b:"#0e4028"},
    hybrid:{l:"⚡ Hybrid",bg:"#1a1a00",c:"#f5c842",b:"#3a3a00"},
    onsite:{l:"🏢 On-Site",bg:"#0a1a30",c:"#3b8aff",b:"#0e2245"},
    unknown:{l:"📍 Unknown",bg:"#1a1a2e",c:"#7aaabb",b:"#2a2a50"}};
  return m[t]||m.unknown;
}
function visa(j){
  const b=`${j.title} ${j.description||""}`.toLowerCase();
  const ns=b.includes("no sponsor")||b.includes("cannot sponsor")||b.includes("will not sponsor");
  const sp=b.includes("sponsor")&&!ns;
  const co=b.includes("us citizen")||b.includes("security clearance");
  if(co)return{s:"co",l:"🚫 Citizen Only",bg:"#2a0e0e",c:"#ff6b72",b:"#3a1010"};
  if(sp)return{s:"sp",l:"✓ Sponsors H1B/OPT",bg:"#0a2e1e",c:"#00e8a2",b:"#0e4028"};
  if(ns)return{s:"ns",l:"⚡ H1B Transfer/OPT OK",bg:"#1a1000",c:"#f5c842",b:"#2a2000"};
  return{s:"ok",l:"✓ Visa Friendly",bg:"#0a1a08",c:"#7acc44",b:"#1a3010"};
}
function careerHome(j){
  const c=(j.company?.display_name||"").toLowerCase();
  for(const[k,u]of Object.entries(KNOWN)){if(c.includes(k)||k.includes(c))return u;}
  return`https://www.${(j.company?.display_name||"").replace(/[^a-zA-Z0-9]/g,"").toLowerCase()}.com/careers`;
}
function resume(j){
  const t=tags(j);const sk=[...new Set([...t,...PROFILE.coreSkills.slice(0,14)])].slice(0,20);
  return`${PROFILE.name}\n${PROFILE.title}\n${PROFILE.location} | ${PROFILE.phone} | ${PROFILE.email}\n\nPROFESSIONAL SUMMARY\nTailored for: ${j.title}${j.company?.display_name?" @ "+j.company.display_name:""}\nJava Full Stack Developer with 5+ years designing scalable microservices and enterprise web apps.\nExpert in ${t.slice(0,4).join(", ")||"key technologies"}.\n\nKEY SKILLS\n${sk.map(s=>s.toUpperCase()).join("  ·  ")}\n\nEMPLOYMENT HISTORY\n${PROFILE.experience.map(e=>`${e.period}  |  ${e.role}  —  ${e.company}\n${e.bullets.map(b=>"  • "+b).join("\n")}`).join("\n\n")}\n\nEDUCATION\nM.S. Computer Science — Auburn University, Montgomery (May 2023–May 2025)`;
}
function cover(j){
  const t=tags(j).slice(0,3).join(", ")||"key technologies";
  return`Dear ${j.company?.display_name||"Hiring Team"},\n\nI am writing to express my strong interest in the ${j.title} position${j.company?.display_name?" at "+j.company.display_name:""}. With 5+ years of Java Full Stack Development experience, and deep expertise in ${t}, I am confident I can deliver immediate impact.\n\nIn my current role at KPMG US (Atlanta, GA), I design and maintain high-performance enterprise microservices using Java 17, Spring Boot, and Spring Cloud, develop responsive React/Angular frontends, and integrate AI/ML and Generative AI APIs for fraud detection.\n\n• Full Stack: Java 17 + Spring Boot backend + React.js/Angular frontend with TypeScript\n• Microservices & Cloud: AWS (EC2, S3, Lambda, EKS) and Azure (AKS) with Docker + Kubernetes\n• API & Security: RESTful, GraphQL, OAuth 2.0, JWT, OpenID Connect — enterprise-grade\n• Event-Driven: Apache Kafka, RabbitMQ, JMS for real-time streaming and fraud detection\n• DevOps: Jenkins, GitHub Actions, Maven, Docker, Kubernetes for automated deployments\n• AI/ML: GitHub Copilot, LLM APIs, NLP, Generative AI for intelligent automation\n\nM.S. Computer Science – Auburn University (May 2025). AWS Certified. Immediately available across the United States.\n\nBest regards,\n${PROFILE.name}\n${PROFILE.phone} | ${PROFILE.email} | ${PROFILE.location}`;
}

async function fetchJobs(silent=false){
  if(!silent){loading=true;render();}
  const term=SEARCH_TERMS[Math.floor(Math.random()*SEARCH_TERMS.length)];
  const p=new URLSearchParams({app_id:APP_ID,app_key:APP_KEY,results_per_page:20,what:term,where:"united states",sort_by:"date",full_time:1});
  const directUrl=`${BASE}/1?${p}`;
  // Try direct first (Adzuna supports CORS), then proxies as fallback
  const attempts=[
    ()=>fetch(directUrl),
    ()=>fetch(`https://corsproxy.io/?${encodeURIComponent(directUrl)}`),
    ()=>fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(directUrl)}`),
    ()=>fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(directUrl)}`),
  ];
  let data=null;
  for(const attempt of attempts){
    try{
      const r=await attempt();
      if(r.ok){
        const txt=await r.text();
        const parsed=JSON.parse(txt);
        if(parsed?.results){data=parsed;break;}
      }
    }catch(e){continue;}
  }
  if(data?.results){
    const scored=data.results.map(j=>{const t=tags(j);return{...j,_m:score(j),_t:t,_wt:wtype(j),_v:visa(j),_ts:new Date(j.created||0).getTime(),_new:true}});
    const ex=new Set(jobs.map(j=>j.id));
    const fresh=scored.filter(j=>!ex.has(j.id));
    newIds=new Set(fresh.map(j=>j.id));
    setTimeout(()=>{newIds=new Set();render();},6000);
    jobs=[...fresh,...jobs].slice(0,100).sort((a,b)=>(b._ts||0)-(a._ts||0));
    lastUpdate=new Date();countdown=30;
    if(silent&&fresh.length>0)toast(`✓ ${fresh.length} new jobs found!`);
  }else{
    if(!silent)toast("⚠ Could not load jobs. Retrying...",false);
    // Show helpful message in UI
    if(!silent){
      const el=document.getElementById("app");
      if(el&&jobs.length===0){
        setTimeout(()=>fetchJobs(true),5000); // auto retry in 5s
      }
    }
  }
  loading=false;render();
}

function startTimers(){
  clearInterval(cdInt);clearInterval(rfInt);
  fetchJobs();
  rfInt=setInterval(()=>fetchJobs(true),30000);
  cdInt=setInterval(()=>{countdown=countdown>0?countdown-1:30;
    const el=document.getElementById("cdn");const ci=document.getElementById("cdci");
    if(el)el.textContent=countdown;
    if(ci)ci.setAttribute("stroke-dasharray",`${2*Math.PI*18*(countdown/30)} 999`);
  },1000);
}

function filtered(){
  return jobs.filter(j=>j._m>=filterMin)
    .filter(j=>filterWT==="all"||j._wt===filterWT)
    .filter(j=>{
      if(filterVisa==="all")return true;
      if(filterVisa==="sp")return j._v.s==="sp";
      if(filterVisa==="nco")return j._v.s!=="co";
      if(filterVisa==="ok")return["sp","ok","ns"].includes(j._v.s);
      return true;
    }).slice(0,60);
}

function toast(msg,ok=true){
  const t=document.getElementById("toast");
  t.textContent=msg;t.style.display="block";
  t.style.background=ok?"#0a2e1e":"#2a0e0e";
  t.style.border=`1px solid ${ok?"#00e8a2":"#ff6b72"}`;
  t.style.color=ok?"#00e8a2":"#ff6b72";
  setTimeout(()=>t.style.display="none",3500);
}
let mc_=null;
function openModal(type,id){
  const j=jobs.find(x=>x.id===id);if(!j)return;
  mc_=type==="r"?resume(j):cover(j);
  document.getElementById("mtitle").textContent=type==="r"?"📄 Tailored Resume":"✉️ Cover Letter";
  document.getElementById("msub").textContent=`${j.title} @ ${j.company?.display_name}`;
  document.getElementById("mbody").textContent=mc_;
  document.getElementById("modal").style.display="flex";
}
function closeModal(){document.getElementById("modal").style.display="none";}
function copyModal(){navigator.clipboard.writeText(mc_||"");toast("✓ Copied!");}
function markApplied(id){
  const j=jobs.find(x=>x.id===id);if(!j)return;
  if(!tracker.find(t=>t.id===id))tracker.push({...j,_s:"Applied",_d:new Date().toLocaleDateString()});
  toast(`✓ Applied: ${j.title}`);render();
}
function updSt(id,s){const t=tracker.find(t=>t.id===id);if(t)t._s=s;render();}

function render(){
  const f=filtered();
  const st={tot:jobs.length,top:jobs.filter(j=>j._m>=88).length,app:tracker.length,int:tracker.filter(t=>t._s==="Interview").length};
  document.getElementById("app").innerHTML=`
  <div style="background:#120800;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;">

          <div>
            <div style="font-size:15px;font-weight:800;letter-spacing:1px;">JOB ASSISTANT</div>
            <div style="font-size:10px;color:var(--muted);letter-spacing:2px;">LIVE · USA · SOFTWARE ENGINEER · RAMYASRI AKULA</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:16px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="position:relative;width:44px;height:44px;">
              <svg width="44" height="44" viewBox="0 0 44 44" style="transform:rotate(-90deg);">
                <circle cx="22" cy="22" r="18" fill="none" stroke="var(--border)" stroke-width="3"/>

              <div id="cdn" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fb923c;font-family:'DM Mono',monospace;">${countdown}</div>

            <div style="font-size:11px;color:var(--muted);"><div>next refresh</div><div style="color:#fb923c;font-size:10px;">every 30s</div>${lastUpdate?`<div style="font-size:10px;">${lastUpdate.toLocaleTimeString()}</div>`:""}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            <div style="width:8px;height:8px;border-radius:50%;background:#fb923c;box-shadow:0 0 8px #fb923c;" class="pulse"></div>
            <span style="font-size:11px;color:var(--muted);">LIVE</span>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:2px;">
        ${[["feed","Job Feed"],["tracker","Tracker"],["profile","Profile"]].map(([id,l])=>`<button class="tab-btn${tab===id?" on":""}" onclick="tab='${id}';render()">${l}</button>`).join("")}
      </div>
    </div>
  </div>
  <div style="max-width:1280px;margin:0 auto;padding:22px 20px;">
    <div style="display:flex;gap:14px;margin-bottom:24px;flex-wrap:wrap;">
      ${[["◎ Jobs Found",st.tot,"#fb923c"],["★ 88%+ Match",st.top,"#ea580c"],["✓ Applied",st.app,"#f5c842"],["☎ Interviews",st.int,"#ff6b72"]].map(([l,v,c])=>`<div class="card" style="flex:1 1 120px;padding:18px 20px;min-width:110px;"><div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;">${l}</div><div style="font-size:34px;font-weight:800;color:${c};line-height:1;">${v}</div></div>`).join("")}
      <div class="card" style="flex:1 1 160px;padding:18px 20px;min-width:160px;"><div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;">🌐 Live USA Jobs</div><div style="font-size:28px;font-weight:800;color:#fb923c;line-height:1;">${jobs.length}</div><div style="font-size:11px;color:var(--muted);margin-top:4px;">loaded &amp; scored</div></div>
    </div>
    ${tab==="feed"?renderFeed(f):""}
    ${tab==="tracker"?renderTracker():""}
    ${tab==="profile"?renderProfile():""}
  </div>`;
}

function renderFeed(f){
  return`<div style="display:flex;gap:20px;align-items:flex-start;">
  <div style="width:390px;flex-shrink:0;">
    <div class="card" style="padding:16px;margin-bottom:14px;">
      <div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;">⚙️ Filters</div>
      <div style="margin-bottom:12px;"><div style="font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">Match Score</div>
        <select class="inp" style="width:100%;" onchange="filterMin=Number(this.value);render()">
          <option value="0"${filterMin===0?" selected":""}>All Matches</option>
          <option value="74"${filterMin===74?" selected":""}>74%+ Match</option>
          <option value="88"${filterMin===88?" selected":""}>88%+ Match</option>
        </select></div>
      <div style="margin-bottom:12px;"><div style="font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">Work Type</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${[["all","All"],["remote","🌐 Remote"],["hybrid","⚡ Hybrid"],["onsite","🏢 On-Site"]].map(([v,l])=>`<button class="fbtn${filterWT===v?" awt":""}" onclick="filterWT='${v}';render()">${l}</button>`).join("")}
        </div></div>
      <div><div style="font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">Visa / Work Auth</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${[["all","All Jobs"],["nco","H1B+OPT OK"],["sp","Sponsors H1B"],["ok","Visa Friendly"]].map(([v,l])=>`<button class="fbtn${filterVisa===v?" avisa":""}" onclick="filterVisa='${v}';render()">${l}</button>`).join("")}
        </div></div>
    </div>
    <button class="btn btn-g" style="width:100%;margin-bottom:14px;" onclick="fetchJobs()" ${loading?"disabled":""}>
      ${loading?`<span class="spin"></span> Scanning…`:`⟳ Refresh · ${f.length} jobs`}
    </button>
    <div style="max-height:calc(100vh - 380px);overflow-y:auto;padding-right:4px;">
      ${f.length===0?`<div style="text-align:center;padding:40px 0;color:var(--muted);">No jobs match filters</div>`:""}
      ${f.map(j=>{const w=wtb(j._wt),ap=tracker.find(t=>t.id===j.id),isN=newIds.has(j.id);
        return`<div class="jcard${selected?.id===j.id?" sel":""}${isN?" glow":""}" onclick="selected=jobs.find(x=>x.id==='${j.id}');render()">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
            <div style="flex:1;min-width:0;">
              <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px;">
                ${isN?`<span class="pill pill-b" style="font-size:10px;">● NEW</span>`:""}
                ${ap?`<span class="pill pill-g" style="font-size:10px;">✓</span>`:""}
              </div>
              <div style="font-weight:700;font-size:14px;line-height:1.2;">${j.title}</div>
              <div style="font-size:12px;color:var(--muted);margin-top:3px;">${j.company?.display_name||""} · ${rt(j.created)}</div>
              <div style="font-size:11px;color:#5577aa;margin-top:2px;">${j.location?.display_name||""}</div>
              <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;">
                <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:${w.bg};color:${w.c};border:1px solid ${w.b};">${w.l}</span>
                <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:${j._v.bg};color:${j._v.c};border:1px solid ${j._v.b};">${j._v.l}</span>
              </div>
              <div style="margin-top:6px;">${j._t.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
              ${j.redirect_url?`<a href="${j.redirect_url}" target="_blank" onclick="event.stopPropagation()" style="text-decoration:none;display:inline-block;margin-top:8px;"><span style="font-size:10px;color:#fb923c;border:1px solid var(--border);background:var(--surface2);padding:3px 10px;border-radius:4px;font-weight:700;">🎯 Apply Now</span></a>`:""}
            </div>
            <div style="text-align:right;flex-shrink:0;">
              <div style="font-size:22px;font-weight:800;color:${mc(j._m)};">${j._m}%</div>
              <div style="font-size:9px;color:var(--muted);letter-spacing:1px;">MATCH</div>
              ${j.salary_max?`<div style="font-size:11px;color:#f5c842;margin-top:4px;">$${Math.round(j.salary_max/1000)}K</div>`:""}
            </div>
          </div>
        </div>`;
      }).join("")}
    </div>
  </div>
  <div style="flex:1;min-width:0;">
    ${selected?renderDetail(selected):`<div style="display:flex;align-items:center;justify-content:center;height:300px;color:var(--border);font-size:14px;border:1px dashed var(--border);border-radius:10px;">← Select a job to view details</div>`}
  </div></div>`;
}

function renderDetail(j){
  const w=wtb(j._wt),ap=tracker.find(t=>t.id===j.id);
  return`<div class="card fade" style="padding:28px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:16px;">
      <div style="flex:1;">
        <h2 style="font-size:20px;font-weight:800;line-height:1.2;">${j.title}</h2>
        <div style="color:#fb923c;font-weight:600;margin-top:6px;">${j.company?.display_name||""}</div>
        <div style="color:var(--muted);font-size:13px;margin-top:3px;">${j.location?.display_name||""}</div>
        <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;">
          <span class="pill pill-g">⏱ ${rt(j.created)}</span>
          ${j.salary_min?`<span class="pill pill-y">$${Math.round(j.salary_min/1000)}K – $${Math.round(j.salary_max/1000)}K</span>`:""}
        </div>
      </div>
      <div style="text-align:center;background:var(--bg);border:2px solid ${mc(j._m)};border-radius:12px;padding:12px 18px;flex-shrink:0;">
        <div style="font-size:38px;font-weight:800;color:${mc(j._m)};line-height:1;">${j._m}%</div>
        <div style="font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:4px;">PROFILE MATCH</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
      <div style="flex:1 1 140px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;">
        <div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;">Work Type</div>
        <div style="font-size:15px;font-weight:800;color:${w.c};">${w.l}</div>
      </div>
      <div style="flex:2 1 260px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;">
        <div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;">Visa Compatibility</div>
        <span style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:4px;background:${j._v.bg};color:${j._v.c};border:1px solid ${j._v.b};">${j._v.l}</span>
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap;">
          ${["OPT ✓","STEM OPT ✓","H1B Transfer ✓","No Sponsorship Needed"].map(s=>`<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;background:#0a1a0a;color:#7acc44;border:1px solid #1a2a1a;">${s}</span>`).join("")}
        </div>
      </div>
    </div>
    <div class="card" style="padding:14px 18px;margin-bottom:20px;background:var(--bg);">
      <div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;">Skill Match</div>
      ${j._t.length?j._t.map(t=>{const h=PROFILE.coreSkills.some(s=>s.includes(t)||t.includes(s));return`<div class="hbar"><div style="width:90px;font-size:11px;color:${h?"#fb923c":"#ff6b72"};font-family:'DM Mono',monospace;">${t}</div><div class="hbar-bg"><div class="hbar-fill" style="width:${h?"100%":"20%"};background:${h?"#fb923c":"#ff6b72"};"></div></div><div style="font-size:10px;color:${h?"#fb923c":"#ff6b72"};width:70px;text-align:right;">${h?"✓ matched":"⚠ gap"}</div></div>`;}).join(""):`<div style="font-size:12px;color:var(--muted);">No tags detected</div>`}
    </div>
    <div style="margin-bottom:20px;">
      <div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;">Job Description</div>
      <div style="font-size:13px;color:#cc9060;line-height:1.75;max-height:160px;overflow-y:auto;">${(j.description||"No description.").replace(/<[^>]+>/g," ")}</div>
    </div>
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:16px;">
      <div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:10px;">🎯 Apply Destinations</div>
      ${j.redirect_url?`<div style="margin-bottom:10px;"><span style="font-size:10px;background:#0a2e1e;color:#00e8a2;padding:2px 8px;border-radius:4px;border:1px solid #0e4028;font-weight:700;">🎯 THIS JOB</span><div style="font-size:11px;color:#00e8a2;word-break:break-all;font-family:'DM Mono',monospace;margin-top:4px;line-height:1.5;">${j.redirect_url}</div></div>`:""}
      <div><span style="font-size:10px;background:#0a1a30;color:#3b8aff;padding:2px 8px;border-radius:4px;border:1px solid #0e2245;font-weight:700;">🏢 CAREERS PAGE</span><div style="font-size:11px;color:#3b8aff;word-break:break-all;font-family:'DM Mono',monospace;margin-top:4px;line-height:1.5;">${careerHome(j)}</div></div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn btn-g" onclick="openModal('r','${j.id}')">📄 Resume</button>
      <button class="btn btn-o" onclick="openModal('c','${j.id}')">✉️ Cover Letter</button>
      ${j.redirect_url?`<a href="${j.redirect_url}" target="_blank" style="text-decoration:none;"><button class="btn" style="background:#fb923c;color:#0a0600;">🎯 Apply to This Job</button></a>`:""}
      <a href="${careerHome(j)}" target="_blank" style="text-decoration:none;"><button class="btn btn-o">🏢 Company Careers</button></a>
      ${!ap?`<button class="btn btn-b" onclick="markApplied('${j.id}')">✓ Mark Applied</button>`:`<span class="pill pill-g" style="padding:8px 16px;">✓ Applied</span>`}
    </div>
  </div>`;
}

function renderTracker(){
  return`<div class="fade">
    <h2 style="font-size:18px;font-weight:800;margin-bottom:4px;">Application Tracker</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:20px;">${tracker.length} applications</p>
    ${tracker.length===0?`<div class="card" style="padding:50px 0;text-align:center;"><div style="font-size:36px;margin-bottom:12px;">📋</div><div style="color:var(--muted);">No applications yet!</div></div>`:
    `<div class="card" style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;min-width:700px;">
        <thead><tr style="border-bottom:1px solid var(--border);">
          ${["Role","Company","Work Type","Visa","Date","Match","Status","Update"].map(h=>`<th style="padding:12px 14px;text-align:left;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;">${h}</th>`).join("")}
        </tr></thead>
        <tbody>
          ${tracker.map(j=>{const w=wtb(j._wt||"unknown");return`<tr style="border-bottom:1px solid var(--bg);">
            <td style="padding:12px 14px;font-size:13px;font-weight:600;">${j.title}</td>
            <td style="padding:12px 14px;font-size:12px;color:#fb923c;">${j.company?.display_name||""}</td>
            <td style="padding:12px 14px;"><span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:${w.bg};color:${w.c};border:1px solid ${w.b};">${w.l}</span></td>
            <td style="padding:12px 14px;"><span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:${j._v?.bg||"#0a1a08"};color:${j._v?.c||"#7acc44"};border:1px solid ${j._v?.b||"#1a3010"};">${j._v?.l||"✓ OK"}</span></td>
            <td style="padding:12px 14px;font-size:11px;color:var(--muted);">${j._d}</td>
            <td style="padding:12px 14px;font-weight:800;color:${mc(j._m)};">${j._m}%</td>
            <td style="padding:12px 14px;"><span class="pill pill-${j._s==="Applied"?"g":j._s==="Interview"?"b":j._s==="Offer"?"y":"r"}">${j._s}</span></td>
            <td style="padding:12px 14px;"><select class="inp" style="font-size:11px;padding:4px 8px;" onchange="updSt('${j.id}',this.value)">${["Applied","Interview","Offer","Rejected"].map(s=>`<option${j._s===s?" selected":""}>${s}</option>`).join("")}</select></td>
          </tr>`;}).join("")}
        </tbody>
      </table>
    </div>
    <div style="display:flex;gap:12px;margin-top:18px;flex-wrap:wrap;">
      ${[["Applied","#fb923c"],["Interview","#3b8aff"],["Offer","#f5c842"],["Rejected","#ff6b72"]].map(([s,c])=>`<div class="card" style="flex:1 1 100px;padding:16px;text-align:center;"><div style="font-size:28px;font-weight:800;color:${c};">${tracker.filter(t=>t._s===s).length}</div><div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px;">${s}</div></div>`).join("")}
    </div>`}
  </div>`;
}

function renderProfile(){
  return`<div class="fade" style="display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start;">
    <div class="card" style="padding:24px;flex:1 1 280px;">
      <div style="display:flex;gap:16px;align-items:center;margin-bottom:20px;">
        <div style="width:54px;height:54px;background:linear-gradient(135deg,#fb923c,#ea580c);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#0a0600;flex-shrink:0;">RM</div>
        <div>
          <div style="font-size:16px;font-weight:800;">${PROFILE.name}</div>
          <div style="color:#fb923c;font-size:13px;margin-top:2px;">${PROFILE.title}</div>
          <div style="color:var(--muted);font-size:12px;margin-top:2px;">${PROFILE.location}</div>
        </div>
      </div>
      <div style="background:#0a1a0a;border:1px solid #0e4028;border-radius:7px;padding:8px 14px;font-size:12px;color:#00e8a2;margin-bottom:16px;">✓ ${PROFILE.visa}</div>
      <div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;">Certifications</div>
      ${PROFILE.certs.map(c=>`<div style="font-size:12px;color:#fb923c;margin-bottom:4px;">🏆 ${c}</div>`).join("")}
      <div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:12px;margin-bottom:8px;">Contact</div>
      <div style="font-size:13px;color:#cc9060;margin-bottom:4px;">${PROFILE.email}</div>
      <div style="font-size:13px;color:#cc9060;">${PROFILE.phone}</div>
    </div>
    <div class="card" style="padding:24px;flex:2 1 400px;">
      <div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;">Skills (${PROFILE.coreSkills.length})</div>
      ${PROFILE.coreSkills.map(s=>`<span class="tag" style="margin:3px;text-transform:uppercase;font-size:10px;">${s}</span>`).join("")}
    </div>
    <div class="card" style="padding:24px;flex:3 1 480px;">
      <div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;">Experience</div>
      ${PROFILE.experience.map(e=>`<div style="border-left:2px solid var(--border);padding-left:18px;margin-bottom:22px;position:relative;">
        <div style="position:absolute;left:-5px;top:6px;width:8px;height:8px;background:#fb923c;border-radius:50%;"></div>
        <div style="font-weight:700;font-size:14px;">${e.role}</div>
        <div style="color:#fb923c;font-size:13px;">${e.company}</div>
        <div style="color:var(--muted);font-size:11px;margin-bottom:8px;">${e.period}</div>
        ${e.bullets.map(b=>`<div style="font-size:12px;color:#cc9060;margin-bottom:3px;">• ${b}</div>`).join("")}
      </div>`).join("")}
    </div>
  </div>`;
}

render();
startTimers();
</script>
</body>
</html>
